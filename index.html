<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2252%22%3E%F0%9F%A6%84%3C/text%3E%3C/svg%3E">
<title>Happy 4th Birthday! 🎉🎉🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { font-family: 'Nunito', sans-serif; }

canvas { display: block; touch-action: none; }

/* Sparkle cursor – desktop only */
@media (pointer: fine) {
  html { cursor: none; }
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    font-size: 22px;
    transform: translate(-50%, -50%);
    -webkit-user-select: none;
    user-select: none;
  }
}
@media (pointer: coarse) {
  #cursor { display: none; }
}

/* Title overlay */
#overlay-title {
  position: fixed;
  top: 1.2rem;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 100;
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
}

.t-happy {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.8rem, 6vw, 4rem);
  display: block;
  background: linear-gradient(90deg, #ff6eb4 0%, #c084fc 20%, #60c5ff 40%, #34d399 60%, #fbbf24 80%, #ff6eb4 100%);
  background-size: 250% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow-flow 4s linear infinite;
  filter: drop-shadow(0 2px 10px rgba(192,132,252,0.5));
  line-height: 1;
}
.t-birthday {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.5rem, 10vw, 7rem);
  display: block;
  background: linear-gradient(90deg, #fbbf24 0%, #fb7185 20%, #c084fc 45%, #60c5ff 70%, #fbbf24 100%);
  background-size: 250% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow-flow 3s linear infinite reverse;
  filter: drop-shadow(0 4px 18px rgba(251,113,133,0.5));
  line-height: 1;
}
@keyframes rainbow-flow { to { background-position: 250% center; } }

.age-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: linear-gradient(135deg, #ff6eb4, #c084fc, #60c5ff);
  background-size: 200% auto;
  color: #fff;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1rem, 3vw, 1.6rem);
  padding: 0.35rem 1.4rem;
  border-radius: 999px;
  margin-top: 0.5rem;
  box-shadow: 0 6px 24px rgba(192,132,252,0.45), 0 0 0 3px #fff, 0 0 0 5px #c084fc;
  animation: pill-pulse 2.2s ease-in-out infinite, rainbow-flow 3s linear infinite;
}
@keyframes pill-pulse {
  0%, 100% { box-shadow: 0 6px 24px rgba(192,132,252,0.45), 0 0 0 3px #fff, 0 0 0 5px #c084fc; transform: scale(1); }
  50%       { box-shadow: 0 10px 34px rgba(192,132,252,0.55), 0 0 0 3px #fff, 0 0 0 7px #c084fc; transform: scale(1.04); }
}

/* Hint bar */
#overlay-hint {
  position: fixed;
  bottom: 1.2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
  background: rgba(255,255,255,0.8);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 0.6rem 1rem;
  border: 2px solid rgba(192,132,252,0.25);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  font-family: 'Fredoka One', cursive;
  font-size: clamp(0.7rem, 2vw, 0.95rem);
  color: #9ca3af;
  text-align: center;
  line-height: 1.35;
  max-width: min(92vw, 900px);
  white-space: normal;
}
#overlay-hint .key { color: #c084fc; }
#overlay-hint .hint-item { display: inline; }
#overlay-hint .hint-item:not(:last-child)::after {
  content: ' · ';
  color: #c084fc;
  opacity: 0.7;
}

@media (max-width: 640px), (pointer: coarse) {
  #overlay-hint {
    left: 0.5rem;
    right: 0.5rem;
    transform: none;
    width: auto;
    max-width: calc(100vw - 1rem);
    bottom: 0.55rem;
    padding: 0.35rem 0.55rem;
    border-radius: 14px;
    font-size: clamp(0.6rem, 2.6vw, 0.76rem);
    line-height: 1.28;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  #overlay-hint .hint-item {
    display: inline;
  }

  #overlay-hint .hint-item:not(:last-child)::after {
    content: ' · ';
    color: #c084fc;
    opacity: 0.7;
  }
}

@supports (left: env(safe-area-inset-left)) {
  @media (max-width: 640px), (pointer: coarse) {
    #overlay-hint {
      left: calc(env(safe-area-inset-left) + 0.5rem);
      right: calc(env(safe-area-inset-right) + 0.5rem);
      bottom: calc(env(safe-area-inset-bottom) + 0.55rem);
      max-width: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 1rem);
    }
  }
}

@media (max-width: 340px) {
  #overlay-hint .hint-item {
    display: block;
  }

  #overlay-hint .hint-item:not(:last-child)::after {
    content: '';
  }
}

/* Loading screen */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #fff5fc, #f0e6ff, #e0f0ff);
  font-family: 'Fredoka One', cursive;
  color: #c084fc;
  font-size: 1.5rem;
  transition: opacity 0.6s;
}
#loading.done { opacity: 0; pointer-events: none; }
.loading-spinner {
  font-size: 3rem;
  animation: spin 1s linear infinite;
  margin-bottom: 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="cursor">✨</div>

<div id="overlay-title">
  <span class="t-happy">Happy</span>
  <span class="t-birthday">Birthday!</span>
  <div class="age-pill">🎂 You're 4! 🎂</div>
</div>

<div id="overlay-hint">
  <span class="hint-item"><span class="key">Drag</span> to explore</span>
  <span class="hint-item"><span class="key">Scroll</span> to zoom</span>
  <span class="hint-item"><span class="key">Tap the 🌈</span> for fireworks! 🎆</span>
  <span class="hint-item"><span class="key">Tap the 🎂</span> for confetti! 🎊</span>
</div>

<div id="loading">
  <div class="loading-spinner">🦄</div>
  Loading your birthday world...
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ════════════════════════════════════════════
   SCENE, CAMERA, RENDERER
   ════════════════════════════════════════════ */
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(28, 22, 28);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

/* Sky gradient background */
(function makeSky() {
  const c = document.createElement('canvas');
  c.width = 2; c.height = 512;
  const g = c.getContext('2d');
  const grd = g.createLinearGradient(0, 0, 0, 512);
  grd.addColorStop(0,   '#ffd6f0');
  grd.addColorStop(0.3, '#e0d6ff');
  grd.addColorStop(0.6, '#d5edff');
  grd.addColorStop(1,   '#c5e8ff');
  g.fillStyle = grd;
  g.fillRect(0, 0, 2, 512);
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.LinearFilter;
  scene.background = tex;
})();

/* ════════════════════════════════════════════
   CONTROLS
   ════════════════════════════════════════════ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.08;
controls.minDistance     = 12;
controls.maxDistance     = 70;
controls.maxPolarAngle  = Math.PI / 2 - 0.05;
controls.minPolarAngle  = 0.3;
controls.autoRotate     = true;
controls.autoRotateSpeed = 0.1;
controls.target.set(0, 2, 0);

/* ════════════════════════════════════════════
   LIGHTING
   ════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0xfff0f5, 0.65));

const hemi = new THREE.HemisphereLight(0xd5edff, 0x8bc990, 0.5);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(20, 30, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;  sun.shadow.camera.bottom = -40;
sun.shadow.camera.near = 1;  sun.shadow.camera.far = 80;
sun.shadow.bias = -0.002;
scene.add(sun);

/* ════════════════════════════════════════════
   TOON GRADIENT MAP
   ════════════════════════════════════════════ */
function makeToonGradient() {
  const c = document.createElement('canvas');
  c.width = 4; c.height = 1;
  const g = c.getContext('2d');
  g.fillStyle = '#666'; g.fillRect(0,0,1,1);
  g.fillStyle = '#999'; g.fillRect(1,0,1,1);
  g.fillStyle = '#ccc'; g.fillRect(2,0,1,1);
  g.fillStyle = '#fff'; g.fillRect(3,0,1,1);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.NearestFilter;
  tex.magFilter = THREE.NearestFilter;
  return tex;
}
const gradMap = makeToonGradient();

function toon(color) {
  return new THREE.MeshToonMaterial({ color, gradientMap: gradMap });
}

/* ════════════════════════════════════════════
   GROUND – rolling hills
   ════════════════════════════════════════════ */
(function makeGround() {
  const geo = new THREE.CircleGeometry(55, 64, 0, Math.PI * 2);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const d = Math.sqrt(x*x + z*z);
    let h = Math.sin(x * 0.15) * Math.cos(z * 0.15) * 1.2
          + Math.sin(x * 0.08 + 1) * Math.cos(z * 0.12 + 2) * 0.7;
    // flatten center area
    if (d < 10) h *= d / 10;
    // taper edges
    if (d > 40) h *= Math.max(0, 1 - (d - 40) / 15);
    pos.setY(i, h);
  }
  geo.computeVertexNormals();

  const mat = toon(0x7ecf8a);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  scene.add(mesh);

  // edge ring
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(53, 56, 64),
    new THREE.MeshBasicMaterial({ color: 0x6ab87a, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -0.05;
  scene.add(ring);
})();

/* Helper: sample ground height at (x,z) */
function groundY(x, z) {
  const d = Math.sqrt(x*x + z*z);
  let h = Math.sin(x * 0.15) * Math.cos(z * 0.15) * 1.2
        + Math.sin(x * 0.08 + 1) * Math.cos(z * 0.12 + 2) * 0.7;
  if (d < 10) h *= d / 10;
  if (d > 40) h *= Math.max(0, 1 - (d - 40) / 15);
  return h;
}

/* ════════════════════════════════════════════
   FLOWERS
   ════════════════════════════════════════════ */
const flowerColors = [0xff6eb4, 0xc084fc, 0xfbbf24, 0xfb7185, 0x60c5ff, 0xe879f9, 0xf472b6, 0x4ade80];
for (let i = 0; i < 50; i++) {
  const angle  = Math.random() * Math.PI * 2;
  const radius = 8 + Math.random() * 38;
  const fx     = Math.cos(angle) * radius;
  const fz     = Math.sin(angle) * radius;
  const fy     = groundY(fx, fz);

  const g = new THREE.Group();
  // stem
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.6, 4), toon(0x3da34d));
  stem.position.y = 0.3;
  g.add(stem);
  // petals
  const col = flowerColors[Math.floor(Math.random() * flowerColors.length)];
  for (let p = 0; p < 5; p++) {
    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 4), toon(col));
    const pa = (p / 5) * Math.PI * 2;
    petal.position.set(Math.cos(pa) * 0.2, 0.65, Math.sin(pa) * 0.2);
    petal.scale.set(1, 0.5, 1);
    g.add(petal);
  }
  // center
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 4), toon(0xfbbf24));
  center.position.y = 0.65;
  g.add(center);

  g.position.set(fx, fy, fz);
  g.rotation.y = Math.random() * Math.PI * 2;
  const s = 0.7 + Math.random() * 0.6;
  g.scale.set(s, s, s);
  scene.add(g);
}

/* ════════════════════════════════════════════
   TREES
   ════════════════════════════════════════════ */
const treePositions = [
  [22, 10], [-18, 20], [30, -15], [-25, -18],
  [10, 30], [-30, 5], [35, 25], [-10, -30],
  [15, -25], [-35, -10]
];
for (const [tx, tz] of treePositions) {
  const ty = groundY(tx, tz);
  const g = new THREE.Group();
  // trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.45, 2.5, 6), toon(0x8B6914));
  trunk.position.y = 1.25;
  trunk.castShadow = true;
  g.add(trunk);
  // foliage layers
  const greens = [0x2d8f47, 0x3da34d, 0x50b860];
  for (let l = 0; l < 3; l++) {
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(2.2 - l * 0.5, 2.2 - l * 0.3, 7),
      toon(greens[l])
    );
    cone.position.y = 2.8 + l * 1.3;
    cone.castShadow = true;
    g.add(cone);
  }
  const s = 0.8 + Math.random() * 0.5;
  g.scale.set(s, s, s);
  g.position.set(tx, ty, tz);
  scene.add(g);
}

/* ════════════════════════════════════════════
   FLOATING SPARKLES
   ════════════════════════════════════════════ */
const sparkles = [];
const sparkleColors = [0xff6eb4, 0xc084fc, 0xfbbf24, 0x60c5ff, 0xe879f9, 0x4ade80];
for (let i = 0; i < 25; i++) {
  const geo = new THREE.SphereGeometry(0.15, 8, 6);
  const col = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
  const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.7 });
  const m   = new THREE.Mesh(geo, mat);
  m.position.set(
    (Math.random() - 0.5) * 60,
    4 + Math.random() * 12,
    (Math.random() - 0.5) * 60
  );
  m.userData.phase  = Math.random() * Math.PI * 2;
  m.userData.speed  = 0.8 + Math.random() * 1.2;
  m.userData.amp    = 0.5 + Math.random() * 1;
  m.userData.baseY  = m.position.y;
  scene.add(m);
  sparkles.push(m);
}

/* ════════════════════════════════════════════
   CHARACTER PLATFORMS
   ════════════════════════════════════════════ */
const platformDist = 18;
const platformData = [
  { pos: [0, 0, -platformDist],  color: 0xf9a8d4, ring: 0xfb7185 }, // North – Unicorn
  { pos: [platformDist, 0, 0],   color: 0xfca5a5, ring: 0xf43f5e }, // East – Minnie
  { pos: [0, 0, platformDist],   color: 0x6ee7b7, ring: 0x059669 }, // South – Grogu
  { pos: [-platformDist, 0, 0],  color: 0x7dd3fc, ring: 0x0284c7 }, // West – Bluey
];
const platformTops = [];
for (const pd of platformData) {
  const [px, , pz] = pd.pos;
  const py = groundY(px, pz);
  // platform disk
  const disk = new THREE.Mesh(
    new THREE.CylinderGeometry(3, 3.2, 0.4, 24),
    toon(pd.color)
  );
  disk.position.set(px, py + 0.2, pz);
  disk.receiveShadow = true;
  scene.add(disk);
  // glowing ring
  const ringGeo = new THREE.TorusGeometry(3.1, 0.12, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: pd.ring, transparent: true, opacity: 0.6 });
  const ringMesh = new THREE.Mesh(ringGeo, ringMat);
  ringMesh.rotation.x = -Math.PI / 2;
  ringMesh.position.set(px, py + 0.42, pz);
  scene.add(ringMesh);
  platformTops.push({ x: px, y: py + 0.42, z: pz });
}

/* ════════════════════════════════════════════
   CHARACTERS
   ════════════════════════════════════════════ */
const characterGroups = [];

/* ── Unicorn (North) ── */
function buildUnicorn() {
  const g = new THREE.Group();
  // body
  const body = new THREE.Mesh(new THREE.SphereGeometry(1.2, 12, 10), toon(0xffffff));
  body.scale.set(1, 0.85, 1.4);
  body.position.y = 1.8;
  body.castShadow = true;
  g.add(body);
  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 10, 8), toon(0xffffff));
  head.position.set(0, 2.6, -1.3);
  head.castShadow = true;
  g.add(head);
  // horn
  const horn = new THREE.Mesh(new THREE.ConeGeometry(0.15, 1.0, 6), toon(0xffd700));
  horn.position.set(0, 3.35, -1.35);
  horn.rotation.x = -0.15;
  g.add(horn);
  // ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.35, 4), toon(0xfff0f5));
    ear.position.set(side * 0.35, 3.15, -1.1);
    g.add(ear);
  }
  // mane
  const maneColors = [0xff6eb4, 0xc084fc, 0x60c5ff, 0x34d399, 0xfbbf24];
  for (let i = 0; i < 5; i++) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.22, 6, 5), toon(maneColors[i]));
    m.position.set(0, 2.8 - i * 0.25, -0.7 + i * 0.25);
    g.add(m);
  }
  // eyes
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 5), new THREE.MeshBasicMaterial({ color: 0x111111 }));
    eye.position.set(side * 0.3, 2.7, -1.85);
    g.add(eye);
    const shine = new THREE.Mesh(new THREE.SphereGeometry(0.04, 5, 4), new THREE.MeshBasicMaterial({ color: 0xffffff }));
    shine.position.set(side * 0.25, 2.75, -1.88);
    g.add(shine);
  }
  // legs
  for (const [lx, lz] of [[-0.5,-0.6],[0.5,-0.6],[-0.5,0.7],[0.5,0.7]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 1.1, 6), toon(0xffffff));
    leg.position.set(lx, 0.55, lz);
    leg.castShadow = true;
    g.add(leg);
    // hoof
    const hoof = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.15, 6), toon(0xffd700));
    hoof.position.set(lx, 0.05, lz);
    g.add(hoof);
  }
  // tail
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.35, 6, 5), toon(0xff6eb4));
  tail.scale.set(0.6, 1, 0.6);
  tail.position.set(0, 2.2, 1.5);
  g.add(tail);
  const tail2 = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 5), toon(0xc084fc));
  tail2.position.set(0, 2.6, 1.7);
  g.add(tail2);

  return g;
}

/* ── Minnie Mouse (East) ── */
function buildMinnie() {
  const g = new THREE.Group();
  // dress body
  const dress = new THREE.Mesh(new THREE.SphereGeometry(1.0, 12, 10), toon(0xe8192c));
  dress.scale.set(1, 1.1, 0.9);
  dress.position.y = 1.4;
  dress.castShadow = true;
  g.add(dress);
  // polka dots
  for (let i = 0; i < 8; i++) {
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 5), toon(0xffffff));
    const theta = Math.random() * Math.PI;
    const phi   = Math.random() * Math.PI * 2;
    dot.position.set(
      Math.sin(theta) * Math.cos(phi) * 1.03,
      1.4 + Math.cos(theta) * 1.1,
      Math.sin(theta) * Math.sin(phi) * 0.92
    );
    g.add(dot);
  }
  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.75, 10, 8), toon(0x222222));
  head.position.set(0, 2.8, 0);
  head.castShadow = true;
  g.add(head);
  // ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.45, 8, 7), toon(0x222222));
    ear.position.set(side * 0.6, 3.5, 0);
    g.add(ear);
  }
  // bow
  for (const side of [-1, 1]) {
    const bowPart = new THREE.Mesh(new THREE.SphereGeometry(0.3, 7, 5), toon(0xe8192c));

/* ════════════════════════════════════════════
   CHARACTER NAME LABELS (Sprites)
   ════════════════════════════════════════════ */
function makeLabel(name, tag, accentColor) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 160;
  const g = c.getContext('2d');

  g.clearRect(0, 0, 512, 160);
  // background pill
  g.fillStyle = 'rgba(255,255,255,0.85)';
  roundRect(g, 30, 10, 452, 140, 30);
  g.fill();
  g.strokeStyle = accentColor;
  g.lineWidth = 4;
  roundRect(g, 30, 10, 452, 140, 30);
  g.stroke();

  g.textAlign = 'center';
  g.textBaseline = 'middle';

  // name
  g.font = 'bold 52px Fredoka One, sans-serif';
  g.fillStyle = '#374151';
  g.fillText(name, 256, 60);

  // tag
  g.font = 'bold 28px Nunito, sans-serif';
  g.fillStyle = '#9ca3af';
  g.fillText(tag, 256, 115);

  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(5, 1.6, 1);
  return sprite;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const labelSprites = [];
for (let i = 0; i < 4; i++) {
  const cn  = charNames[i];

/* ════════════════════════════════════════════
   RAYCASTER – click rainbow for fireworks
   ════════════════════════════════════════════ */
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();
let pointerDownPos = null;

renderer.domElement.addEventListener('pointerdown', e => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('pointerup', e => {
  if (!pointerDownPos) return;
  const dx = e.clientX - pointerDownPos.x;
  const dy = e.clientY - pointerDownPos.y;
  // only fire if it's a tap/click, not a drag
  if (Math.sqrt(dx*dx + dy*dy) > 8) { pointerDownPos = null; return; }
  pointerDownPos = null;

  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const hits = raycaster.intersectObjects(rainbowMeshes, false);
  if (hits.length > 0) {
    spawnFireworkBursts(hits[0].point);
  }

  if (cakeGroup) {
    const cakeHits = raycaster.intersectObjects(cakeGroup.children, true);
    if (cakeHits.length > 0) {
      spawnConfetti(cakeHits[0].point);
    }
  }
});

/* ════════════════════════════════════════════
   FIREWORKS (3D particle system)
   ════════════════════════════════════════════ */
const activeBursts = [];

/* Custom shader for firework particles */
const fwVertShader = `
  attribute float aLife;
  attribute vec3 aVelocity;
  attribute vec3 aColor;
  uniform float uTime;
  uniform float uGravity;
  varying float vLife;
  varying vec3 vColor;
  void main() {
    float t = uTime;
    vec3 pos = position + aVelocity * t + vec3(0, -0.5 * uGravity * t * t, 0);
    float life = aLife - t * 0.45;
    vLife = clamp(life, 0.0, 1.0);
    vColor = aColor;
    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
    gl_PointSize = max(0.0, vLife * 8.0 * (300.0 / -mvPos.z));
    gl_Position = projectionMatrix * mvPos;
  }
`;
const fwFragShader = `
  varying float vLife;
  varying vec3 vColor;
  void main() {
    float d = length(gl_PointCoord - 0.5) * 2.0;
    if (d > 1.0) discard;
    float alpha = vLife * (1.0 - d * d);
    gl_FragColor = vec4(vColor, alpha);
  }
`;

function spawnFireworkBursts(hitPoint) {
  const baseHue = Math.random() * 360;
  for (let b = 0; b < 3; b++) {
    setTimeout(() => {
      spawnSingleBurst(
        hitPoint.x + (b - 1) * 4 + (Math.random() - 0.5) * 3,
        hitPoint.y + 5 + Math.random() * 8,
        hitPoint.z + (Math.random() - 0.5) * 4,
        baseHue + b * 120
      );
    }, b * 300);
  }
}

function spawnSingleBurst(bx, by, bz, hue) {
  const count = 100;
  const positions  = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  const colors     = new Float32Array(count * 3);
  const lives      = new Float32Array(count);
  const c = new THREE.Color();

  for (let i = 0; i < count; i++) {
    positions[i*3]   = bx;
    positions[i*3+1] = by;
    positions[i*3+2] = bz;

    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const speed = 2 + Math.random() * 6;
    velocities[i*3]   = Math.sin(phi) * Math.cos(theta) * speed;
    velocities[i*3+1] = Math.sin(phi) * Math.sin(theta) * speed;
    velocities[i*3+2] = Math.cos(phi) * speed;

    c.setHSL(((hue + (Math.random() - 0.5) * 50) % 360) / 360, 0.9, 0.65);
    colors[i*3]   = c.r;
    colors[i*3+1] = c.g;
    colors[i*3+2] = c.b;

    lives[i] = 0.8 + Math.random() * 0.4;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',  new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aVelocity', new THREE.BufferAttribute(velocities, 3));
  geo.setAttribute('aColor',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('aLife',     new THREE.BufferAttribute(lives, 1));

  const mat = new THREE.ShaderMaterial({
    vertexShader:   fwVertShader,
    fragmentShader: fwFragShader,
    uniforms: {
      uTime:    { value: 0 },
      uGravity: { value: 3.0 }
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // flash light
  const flash = new THREE.PointLight(
    new THREE.Color().setHSL(hue / 360, 1, 0.7),
    3, 30
  );
  flash.position.set(bx, by, bz);
  scene.add(flash);

  activeBursts.push({
    points, mat, flash,
    startTime: performance.now(),
    duration: 2800
  });
}

/* ════════════════════════════════════════════
   CONFETTI (3D particle system)
   ════════════════════════════════════════════ */
const activeConfetti = [];

const confettiVertShader = `
  attribute float aLife;
  attribute vec3 aVelocity;
  attribute vec3 aColor;
  attribute float aSeed;
  uniform float uTime;
  varying float vLife;
  varying vec3 vColor;
  void main() {
    float t = uTime;
    float flutter = sin(t * 5.0 + aSeed * 6.28) * 0.6;
    vec3 pos = position + aVelocity * t + vec3(flutter, -4.0 * t * t * 0.5, flutter * 0.5);
    float life = aLife - t * 0.22;
    vLife = clamp(life, 0.0, 1.0);
    vColor = aColor;
    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
    gl_PointSize = max(0.0, vLife * 10.0 * (300.0 / -mvPos.z));
    gl_Position = projectionMatrix * mvPos;
  }
`;

const confettiFragShader = `
  varying float vLife;
  varying vec3 vColor;
  void main() {
    float d = length(gl_PointCoord - 0.5) * 2.0;
    if (d > 1.0) discard;
    float alpha = vLife * (1.0 - d * 0.4);
    gl_FragColor = vec4(vColor, alpha);
  }
`;

function spawnConfetti(origin) {
  const count = 200;
  const positions  = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  const colors     = new Float32Array(count * 3);
  const lives      = new Float32Array(count);
  const seeds      = new Float32Array(count);
  const c = new THREE.Color();
  const confettiHues = [0, 30, 60, 120, 200, 280, 320];

  for (let i = 0; i < count; i++) {
    positions[i*3]   = origin.x;
    positions[i*3+1] = origin.y + 3;
    positions[i*3+2] = origin.z;

    const angle = Math.random() * Math.PI * 2;
    const hSpeed = 1.5 + Math.random() * 4;
    velocities[i*3]   = Math.cos(angle) * hSpeed;
    velocities[i*3+1] = 5 + Math.random() * 7;
    velocities[i*3+2] = Math.sin(angle) * hSpeed;

    const hue = confettiHues[Math.floor(Math.random() * confettiHues.length)];
    c.setHSL(hue / 360, 0.9, 0.6);
    colors[i*3]   = c.r;
    colors[i*3+1] = c.g;
    colors[i*3+2] = c.b;

    lives[i] = 0.9 + Math.random() * 0.3;
    seeds[i] = Math.random();
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',  new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aVelocity', new THREE.BufferAttribute(velocities, 3));
  geo.setAttribute('aColor',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('aLife',     new THREE.BufferAttribute(lives, 1));
  geo.setAttribute('aSeed',     new THREE.BufferAttribute(seeds, 1));

  const mat = new THREE.ShaderMaterial({
    vertexShader:   confettiVertShader,
    fragmentShader: confettiFragShader,
    uniforms: { uTime: { value: 0 } },
    transparent: true,
    depthWrite: false
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  activeConfetti.push({
    points, mat,
    startTime: performance.now(),
    duration: 4500
  });
}

/* ════════════════════════════════════════════
   CURSOR
   ════════════════════════════════════════════ */
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

/* ════════════════════════════════════════════
   RENDER LOOP
   ════════════════════════════════════════════ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  controls.update();

  // Bob characters
  for (const cg of characterGroups) {
    cg.position.y = cg.userData.baseY + Math.sin(t * cg.userData.speed + cg.userData.phase) * 0.3;
  }

  // Bob labels with characters
  for (let i = 0; i < labelSprites.length; i++) {
    labelSprites[i].position.y = platformTops[i].y + 5.5 + Math.sin(t * characterGroups[i].userData.speed + characterGroups[i].userData.phase) * 0.3;
  }

  // Bob sparkles
  for (const s of sparkles) {
    s.position.y = s.userData.baseY + Math.sin(t * s.userData.speed + s.userData.phase) * s.userData.amp;
    s.material.opacity = 0.4 + Math.sin(t * 2 + s.userData.phase) * 0.3;
  }

  // Flicker flames
  scene.traverse(obj => {
    if (obj.userData.isFlame) {
      const fs = 0.7 + Math.sin(t * 8 + obj.userData.phase) * 0.15 + Math.sin(t * 13 + obj.userData.phase) * 0.1;
      obj.scale.set(fs, 1.2 + Math.sin(t * 10 + obj.userData.phase) * 0.3, fs);
    }
  });

  // Rainbow shimmer
  const shimmer = 0.5 + Math.sin(t * 1.5) * 0.15;
  for (const rm of rainbowMeshes) rm.material.opacity = shimmer;

  // Update firework bursts
  const now = performance.now();
  for (let i = activeBursts.length - 1; i >= 0; i--) {
    const b = activeBursts[i];
    const elapsed = (now - b.startTime) / 1000;
    b.mat.uniforms.uTime.value = elapsed;
    b.flash.intensity = Math.max(0, 3 * (1 - elapsed / 0.4));
    if (elapsed * 1000 > b.duration) {
      scene.remove(b.points);
      scene.remove(b.flash);
      b.points.geometry.dispose();
      b.mat.dispose();
      b.flash.dispose();
      activeBursts.splice(i, 1);
    }
  }

  // Update confetti
  for (let i = activeConfetti.length - 1; i >= 0; i--) {
    const cf = activeConfetti[i];
    const elapsed = (now - cf.startTime) / 1000;
    cf.mat.uniforms.uTime.value = elapsed;
    if (elapsed * 1000 > cf.duration) {
      scene.remove(cf.points);
      cf.points.geometry.dispose();
      cf.mat.dispose();
      activeConfetti.splice(i, 1);
    }
  }

  renderer.render(scene, camera);
}

/* ════════════════════════════════════════════
   RESIZE
   ════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ════════════════════════════════════════════
   START
   ════════════════════════════════════════════ */
// Hide loading screen after first frame
requestAnimationFrame(() => {
  document.getElementById('loading').classList.add('done');
  setTimeout(() => document.getElementById('loading').remove(), 700);
});

animate();
</script>
